        function selectClass(className) {
            document.querySelectorAll('.btn-class').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(`btn-${className}`).classList.add('active');
            document.getElementById('selected-title').innerText = className;
            
            const jadwalList = document.getElementById('jadwal-list');
            jadwalList.innerHTML = ''; 

            // Mendapatkan Tanggal Hari Ini (Format: YYYY-MM-DD)
            const today = new Date();
            const yyyy = today.getFullYear();
            const mm = String(today.getMonth() + 1).padStart(2, '0');
            const dd = String(today.getDate()).padStart(2, '0');
            const formattedToday = `${yyyy}-${mm}-${dd}`;

            let counterJadwalTampil = 0;

            // Render Jadwal dengan filter tanggal
            examData[className].forEach(item => {
                
                // JIKA TANGGAL HARI INI BELUM MEMASUKKI TANGGAL UJIAN, MAKA JANGAN TAMPILKAN (SKIP)
                if (formattedToday < item.tanggalSistem) {
                    return; 
                }

                counterJadwalTampil++;
                let actionHtml = '';

                if(item.isAgama) {
                    actionHtml = `
                        <div class="grid grid-cols-2 gap-2 mt-2">
                            <a href="${item.urlIslam}" target="_blank" class="text-center bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-2 px-2 rounded-lg text-xs btn-3d block">
                                🕌 AGAMA ISLAM
                            </a>
                            <a href="${item.urlKristen}" target="_blank" class="text-center bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-2 rounded-lg text-xs btn-3d block">
                                ⛪ AGAMA KRISTEN
                            </a>
                        </div>
                    `;
                } else {
                    actionHtml = `
                        <a href="${item.url}" target="_blank" class="mt-2 text-center bg-gradient-to-r from-green-600 to-green-700 hover:from-green-700 hover:to-green-800 text-white font-bold py-2.5 px-4 rounded-xl text-xs tracking-wider btn-3d block uppercase">
                            Mulai Ujian 📝
                        </a>
                    `;
                }

                const card = `
                    <div class="bg-white border border-slate-100 rounded-xl p-3 shadow-inner flex flex-col justify-between animate-fade-in">
                        <div class="flex justify-between items-start mb-1">
                            <div class="text-xs font-bold text-green-800 bg-green-50 px-2 py-0.5 rounded border border-green-200">
                                ${item.hari}
                            </div>
                            <div class="text-[11px] font-medium text-slate-500 bg-slate-100 px-2 py-0.5 rounded">
                                🕒 ${item.waktu} WITA
                            </div>
                        </div>
                        <div class="text-sm font-bold text-slate-800 my-1">${item.mapel}</div>
                        ${actionHtml}
                    </div>
                `;
                jadwalList.innerHTML += card;
            });

            // Jika tidak ada jadwal ujian yang aktif atau sesuai untuk hari ini
            if (counterJadwalTampil === 0) {
                jadwalList.innerHTML = `
                    <div class="text-center py-6 text-sm text-slate-500 font-medium">
                        📭 Belum ada jadwal ujian yang aktif untuk kelas ini.
                    </div>
                `;
            }

            const section = document.getElementById('jadwal-section');
            section.classList.remove('hidden');
            section.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
